<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark only">
  <meta name="background-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html, body {
      background-color: #000000 !important;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      /* Webkit magic bullet to prevent mobile browsers from miscalculating the height */
      height: -webkit-fill-available; 
      overflow: hidden; 
      position: relative; /* Allows us to pin elements directly to the glass */
    }

    /* Pinned exactly to the center of the screen */
    .speed-cluster {
      position: absolute;
      top: 45%; /* Locked slightly above dead-center for visual balance */
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #speedValue {
      font-size: 75vmin; 
      font-weight: 900;
      line-height: 0.8; 
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .speed-unit {
      font-size: 10vmin; 
      font-weight: bold;
      color: #888888;
      margin-top: 10px;
    }

    /* Pinned safely above the white bar zone */
    .telemetry-cluster {
      position: absolute;
      bottom: calc(60px + env(safe-area-inset-bottom)); /* Locked firmly above the home button zone */
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      pointer-events: none;
    }

    .data-box {
      text-align: center;
      width: 45%;
    }

    .data-label {
      font-size: 14px;
      color: #666666;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .data-value {
      font-size: 28px; 
      font-weight: bold;
      color: #00ffcc; 
    }

    @media (orientation: landscape) {
      .telemetry-cluster {
        display: none; 
      }
      .speed-cluster {
        top: 50%; /* Re-centers perfectly in landscape */
      }
    }
  </style>
</head>
<body>

  <div class="speed-cluster">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
  </div>

  <div id="telemetryPanel" class="telemetry-cluster">
    <div class="data-box">
      <div class="data-label">ALTITUDE</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html, body {
      background-color: #000000 !important;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      height: 100vh;
      width: 100vw;
    }

    body {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Speed Container acts as a giant button now */
    .speed-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      cursor: pointer; /* Gives a visual hint it can be tapped */
    }

    #speedValue {
      font-size: 40vmin; 
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .speed-unit {
      font-size: 8vmin;
      font-weight: bold;
      color: #888888;
      margin-top: -10px;
    }

    .telemetry-panel {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      padding: 25px 10px;
      background-color: #111111;
      border-top: 2px solid #333333;
    }

    .data-box {
      text-align: center;
      width: 45%;
    }

    .data-label {
      font-size: 14px;
      color: #888888;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .data-value {
      font-size: 28px;
      font-weight: bold;
      color: #00ffcc; 
    }

    @media (orientation: landscape) {
      .telemetry-panel {
        display: none; 
      }
    }
  </style>
</head>
<body>

  <div class="speed-container" onclick="toggleImmersiveFullscreen()">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
  </div>

  <div id="telemetryPanel" class="telemetry-panel">
    <div class="data-box">
      <div class="data-label">ALTITUDE</div>
      <div id="altValue" class="data-value">-- ft</div>
    </div>
    <div class="data-box">
      <div class="data-label">DIRECTION</div>
      <div id="dirValue" class="data-value">--</div>
    </div>
  </div>

  <script>
    let wakeLock = null;

    function getDirectionString(heading) {
      if (heading === null || isNaN(heading)) return "--";
      const directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      const index = Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8;
      return directions[index];
    }

    // New Function: Handles sliding away the phone's navigation bar
    function toggleImmersiveFullscreen() {
      if (!document.fullscreenElement) {
        // Request edge-to-edge layout immersion from the operating system
        document.documentElement.requestFullscreen()
          .catch((err) => {
            console.warn(`Error enabling immersive mode: ${err.message}`);
          });
      } else {
        // If already fullscreen, tap again to bring the system bars back
        document.exitFullscreen();
      }
    }

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log("Screen Wake Lock active.");
        } catch (err) {
          console.warn("Wake Lock request failed:", err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (!wakeLock) {
            requestWakeLock();
          }
          
          let speedMps = position.coords.speed;
          if (speedMps === null || speedMps < 0) speedMps = 0; 
          let speedMph = Math.round(speedMps * 2.23694);
          document.getElementById('speedValue').innerText = speedMph;

          let altMeters = position.coords.altitude;
          if (altMeters !== null) {
            let altFeet = Math.round(altMeters * 3.28084);
            document.getElementById('altValue').innerText = altFeet + " ft";
          }

          let headingDegrees = position.coords.heading;
          if (speedMph > 0 && headingDegrees !== null) {
            document.getElementById('dirValue').innerText = getDirectionString(headingDegrees);
          }
        },
        (error) => {
          console.warn("GPS Error:", error.message);
          if(error.code === 1) {
             document.getElementById('speedValue').innerText = "GPS";
             document.getElementById('dirValue').innerText = "DENIED";
          }
        },
        {
          enableHighAccuracy: true, 
          maximumAge: 0             
        }
      );
    } else {
      document.getElementById('speedValue').innerText = "N/A";
      alert("Geolocation is not supported by your browser.");
    }
  </script>

</body>
</html>

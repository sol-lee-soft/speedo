<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000">
  <meta name="background-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html {
      background-color: #000000 !important;
      color-scheme: dark !important;
      height: 100%;
    }

    body {
      background-color: #000000 !important;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Single unified container filling 100% of the display glass */
    .speed-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000000;
      position: relative;
      height: 100%;
      width: 100%;
    }

    #speedValue {
      font-size: 40vmin; 
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .speed-unit {
      font-size: 8vmin;
      font-weight: bold;
      color: #888888;
      margin-top: -10px;
    }

    /* Floating Inline Telemetry (Zero separate panel tracking blocks) */
    .inline-telemetry {
      display: flex;
      gap: 40px;
      margin-top: 30px;
    }

    .telemetry-item {
      text-align: center;
    }

    .telemetry-label {
      font-size: 11px;
      color: #555555;
      letter-spacing: 2px;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .telemetry-value {
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    /* Auto-hide the secondary metrics cleanly in landscape if screen real estate gets tight */
    @media (orientation: landscape) {
      .inline-telemetry {
        margin-top: 10px;
      }
      .telemetry-value {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="speed-container">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
    
    <div class="inline-telemetry">
      <div class="telemetry-item">
        <div class="telemetry-label">ALTITUDE</div>
        <div id="altValue" class="telemetry-value">-- ft</div>
      </div>
      <div class="telemetry-item">
        <div class="telemetry-label">DIRECTION</div>
        <div id="dirValue" class="telemetry-value">--</div>
      </div>
    </div>
  </div>

  <script>
    let wakeLock = null;

    function getDirectionString(heading) {
      if (heading === null || isNaN(heading)) return "--";
      const directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      const index = Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8;
      return directions[index];
    }

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.warn("Wake Lock request failed:", err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (!wakeLock) {
            requestWakeLock();
          }
          
          // 1. SPEED
          let speedMps = position.coords.speed;
          if (speedMps === null || speedMps < 0) speedMps = 0; 
          let speedMph = Math.round(speedMps * 2.23694);
          document.getElementById('speedValue').innerText = speedMph;

          // 2. ALTITUDE
          let altMeters = position.coords.altitude;
          if (altMeters !== null) {
            let altFeet = Math.round(altMeters * 3.28084);
            document.getElementById('altValue').innerText = altFeet + " ft";
          }

          // 3. DIRECTION
          let headingDegrees = position.coords.heading;
          if (speedMph > 0 && headingDegrees !== null) {
            document.getElementById('dirValue').innerText = getDirectionString(headingDegrees);
          }
        },
        (error) => {
          console.warn("GPS Error:", error.message);
          if(error.code === 1) {
             document.getElementById('speedValue').innerText = "GPS";
          }
        },
        {
          enableHighAccuracy: true, 
          maximumAge: 0             
        }
      );
    } else {
      document.getElementById('speedValue').innerText = "N/A";
    }
  </script>

</body>
</html>

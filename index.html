<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000">
  <meta name="background-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* Tells the phone's rendering engine that the root environment is strictly pitch black night-mode */
    html {
      background-color: #000000 !important;
      color-scheme: dark !important;
      height: 100%;
    }

    body {
      background-color: #000000 !important;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
      
      /* Uses CSS environment variables to push the interface safe-space rules edge-to-edge */
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Speed Container fills the screen window completely */
    .speed-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000000 !important;
      height: 100%;
      width: 100%;
    }

    #speedValue {
      font-size: 45vmin; 
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .speed-unit {
      font-size: 9vmin;
      font-weight: bold;
      color: #888888;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="speed-container">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
  </div>

  <script>
    let wakeLock = null;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.warn("Wake Lock request failed:", err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (!wakeLock) {
            requestWakeLock();
          }
          
          let speedMps = position.coords.speed;
          if (speedMps === null || speedMps < 0) speedMps = 0; 
          
          let speedMph = Math.round(speedMps * 2.23694);
          document.getElementById('speedValue').innerText = speedMph;
        },
        (error) => {
          console.warn("GPS Error:", error.message);
          if(error.code === 1) {
             document.getElementById('speedValue').innerText = "GPS";
          }
        },
        {
          enableHighAccuracy: true, 
          maximumAge: 0             
        }
      );
    } else {
      document.getElementById('speedValue').innerText = "N/A";
    }
  </script>

</body>
</html>

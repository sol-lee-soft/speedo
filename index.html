<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark only">
  <meta name="background-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html, body {
      background-color: #000000 !important;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden; 
      position: relative; 
    }

    /* Shifted slightly higher so the telemetry has plenty of breathing room */
    .speed-cluster {
      position: absolute;
      top: 40%; 
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #speedValue {
      font-size: 75vmin; 
      font-weight: 900;
      line-height: 0.8; 
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .speed-unit {
      font-size: 10vmin; 
      font-weight: bold;
      color: #888888;
      margin-top: 10px;
    }

    /* Brute-force lift: Forces the text 12% up the screen, bypassing the browser's lies */
    .telemetry-cluster {
      position: absolute;
      bottom: 12vh; 
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      pointer-events: none;
    }

    .data-box {
      text-align: center;
      width: 45%;
    }

    .data-label {
      font-size: 14px;
      color: #666666;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .data-value {
      font-size: 28px; 
      font-weight: bold;
      color: #00ffcc; 
    }

    @media (orientation: landscape) {
      .telemetry-cluster {
        display: none; 
      }
      .speed-cluster {
        top: 50%; 
      }
    }
  </style>
</head>
<body>

  <div class="speed-cluster">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
  </div>

  <div id="telemetryPanel" class="telemetry-cluster">
    <div class="data-box">
      <div class="data-label">ALTITUDE</div>
      <div id="altValue" class="data-value">-- ft</div>
    </div>
    <div class="data-box">
      <div class="data-label">DIRECTION</div>
      <div id="dirValue" class="data-value">--</div>
    </div>
  </div>

  <script>
    let wakeLock = null;

    function getDirectionString(heading) {
      if (heading === null || isNaN(heading)) return "--";
      const directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      const index = Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8;
      return directions[index];
    }

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.warn("Wake Lock request failed:", err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (!wakeLock) {
            requestWakeLock();
          }
          
          let speedMps = position.coords.speed;
          if (speedMps === null || speedMps < 0) speedMps = 0; 
          let speedMph = Math.round(speedMps * 2.23694);
          document.getElementById('speedValue').innerText = speedMph;

          let altMeters = position.coords.altitude;
          if (altMeters !== null) {
            let altFeet = Math.round(altMeters * 3.28084);
            document.getElementById('altValue').innerText = altFeet + " ft";
          }

          let headingDegrees = position.coords.heading;
          if (speedMph > 0 && headingDegrees !== null) {
            document.getElementById('dirValue').innerText = getDirectionString(headingDegrees);
          }
        },
        (error) => {
          console.warn("GPS Error:", error.message);
          if(error.code === 1) {
             document.getElementById('speedValue').innerText = "GPS";
          }
        },
        {
          enableHighAccuracy: true, 
          maximumAge: 0             
        }
      );
    } else {
      document.getElementById('speedValue').innerText = "N/A";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Digital Speedometer</title>
  
  <link rel="manifest" href="manifest.json">
  
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark only">
  <meta name="background-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html, body {
      background-color: #000000 !important;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      height: 100dvh; 
      width: 100vw;
      overflow: hidden; 
      position: relative; 
      cursor: pointer; 
      -webkit-tap-highlight-color: transparent; 
    }

    .speed-container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none; 
    }

    #speedValue {
      font-size: 85vmin; 
      font-weight: 900;
      line-height: 0.8; 
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      margin-top: -5dvh; 
    }

    .speed-unit {
      font-size: 12vmin; 
      font-weight: bold;
      color: #888888;
      margin-top: 5px;
    }

    .telemetry-panel {
      position: absolute;
      bottom: 8dvh; 
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      pointer-events: none; 
    }

    .data-box {
      text-align: center;
      width: 45%;
    }

    .data-label {
      font-size: 14px;
      color: #666666;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .data-value {
      font-size: 28px; 
      font-weight: bold;
      color: #00ffcc; 
    }

    @media (orientation: landscape) {
      .telemetry-panel {
        display: none; 
      }
    }
  </style>
</head>
<body onclick="appActivationInitializer()">

  <div class="speed-container">
    <div id="speedValue">0</div>
    <div class="speed-unit">MPH</div>
  </div>

  <div id="telemetryPanel" class="telemetry-panel">
    <div class="data-box">
      <div class="data-label">ALTITUDE</div>
      <div id="altValue" class="data-value">-- ft</div>
    </div>
    <div class="data-box">
      <div class="data-label">DIRECTION</div>
      <div id="dirValue" class="data-value">--</div>
    </div>
  </div>

  <script>
    let wakeLock = null;
    let sensorsInitialized = false;
    
    // Low-Pass Filter variables to stabilize the compass jitter
    let smoothedHeading = null;
    const FILTER_FACTOR = 0.05; // Drop this lower (e.g., 0.02) for more smoothing, raise it for faster tracking

    function appActivationInitializer() {
      toggleFullScreen();
      
      if (!sensorsInitialized) {
        initializeCompass();
        sensorsInitialized = true;
      }
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.warn(`Error fullscreen: ${err.message}`);
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }

    async function initializeCompass() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            attachCompassListener();
          } else {
            console.warn("Compass permission denied.");
          }
        } catch (err) {
          console.error("Error requesting compass permission:", err);
        }
      } else {
        attachCompassListener();
      }
    }

    function attachCompassListener() {
      if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientationabsolute', handleOrientationUpdate, true);
        window.addEventListener('deviceorientation', handleOrientationUpdate, true);
      }
    }

    function handleOrientationUpdate(event) {
      let rawHeading = null;
      if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
        rawHeading = event.webkitCompassHeading;
      } else if (event.absolute === true && event.alpha !== null) {
        rawHeading = 360 - event.alpha;
      } else if (event.alpha !== null) {
        rawHeading = 360 - event.alpha;
      }

      if (rawHeading !== null) {
        // Handle the 0/360 degree wrap-around boundary cleanly so the filter doesn't spin backward
        if (smoothedHeading === null) {
          smoothedHeading = rawHeading;
        } else {
          let diff = rawHeading - smoothedHeading;
          if (diff > 180) diff -= 360;
          if (diff < -180) diff += 360;
          
          // Apply exponential low-pass filter math
          smoothedHeading += diff * FILTER_FACTOR;
          smoothedHeading = (smoothedHeading + 360) % 360;
        }

        document.getElementById('dirValue').innerText = getDirectionString(smoothedHeading);
      }
    }

    function getDirectionString(heading) {
      if (heading === null || isNaN(heading)) return "--";
      const directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
      // Quick round calculation to match 45-degree chunks
      const index = Math.round(heading / 45) % 8;
      return directions[index];
    }

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.warn("Wake Lock failed:", err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (position) => {
          if (!wakeLock) {
            requestWakeLock();
          }
          
          let speedMps = position.coords.speed;
          if (speedMps === null || speedMps < 0) speedMps = 0; 
          let speedMph = Math.round(speedMps * 2.23694);
          document.getElementById('speedValue').innerText = speedMph;

          let altMeters = position.coords.altitude;
          if (altMeters !== null) {
            let altFeet = altMeters * 3.28084;
            document.getElementById('altValue').innerText = Math.round(altFeet) + " ft";
          } else {
            document.getElementById('altValue').innerText = "-- ft";
          }
        },
        (error) => {
          console.warn("GPS Error:", error.message);
          if(error.code === 1) {
             document.getElementById('speedValue').innerText = "GPS";
          }
        },
        {
          enableHighAccuracy: true, 
          maximumAge: 0             
        }
      );
    } else {
      document.getElementById('speedValue').innerText = "N/A";
    }
  </script>

</body>
</html>
